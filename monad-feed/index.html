<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monad Mainnet — Live Feed</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        background: radial-gradient(ellipse at 50% 40%, #0f0e18 0%, #08070c 100%);
        color: #e8e4dc;
        overscroll-behavior: none;
      }

      body {
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        cursor: default;
        overflow: hidden;
      }

      .page {
        position: relative;
        height: 100vh;
        overflow: hidden;
        overscroll-behavior: none;
        isolation: isolate;
      }

      .stage {
        position: relative;
        height: 100%;
      }

      .loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        font: 400 18px "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        color: rgba(232, 228, 220, 0.4);
        transition: opacity 400ms ease;
      }

      .loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .logo {
        position: absolute;
        display: block;
        user-select: none;
        pointer-events: none;
        z-index: 10;
        opacity: 1;
      }

      .line {
        position: absolute;
        white-space: pre;
        color: #e8e4dc;
        font-weight: 450;
        letter-spacing: 0.002em;
        user-select: text;
        cursor: text;
        z-index: 1;
      }
    </style>
  <script type="module" crossorigin src="../monad-feed-tyghn79h.js"></script></head>
  <body>
    <main class="page">
      <div id="loading" class="loading">loading...</div>
      <img id="monad-logo" class="logo" alt="Monad" draggable="false" />
      <div id="stage" class="stage"></div>
    </main>

    
  </body>
</html>
